version: "3"

services:
  # Servicio web, el primero
  web: 
    image: sermorap/p2gps:web 
    deploy: 
      replicas: 1 
      resources: 
        limits: 
          cpus: "0.25" 
          # memory: 300M  
      restart_policy: 
        condition: on-failure 
    ports: 
      - "80:8080"   

  # Servicio de base de datos MongoDB
  mongo:  
    image: sermorap/p2gps:db 
    deploy: 
      replicas: 1   
      resources: 
        limits: 
          cpus: "0.15" 
          # memory: 200M  
      restart_policy: 
        condition: on-failure 
    ports: 
      - "28017:28017" 
      - "27017:27017" 
    volumes: 
      - "db-data:/data/db" 
  
  # Servicio backend
  order: 
    image: sermorap/p2gps:order 
    depends_on: 
      - "mongo"  
    deploy: 
      replicas: 1 
      resources: 
        limits: 
          cpus: "0.3" 
          # memory: 500M  
      restart_policy: 
        condition: on-failure 
    ports: 
      - "8080:8080" 

volumes:  
   db-data:
